# docker-compose.yml
# One-command local deployment. From the repo root:
#
#   docker compose up --build
#
# Then open http://localhost:8000.
#
# Volumes:
#   ./projects   -> /app/projects     (persistent workspaces — survives `docker compose down`)
#   ./knowledge  -> /app/knowledge    (cross-project knowledge library)
#
# API keys:
#   Create a .env file at repo root (copy .env.example → .env) and fill in
#   your ANTHROPIC_API_KEY. The `env_file` directive below injects every
#   variable from that file directly into the container — no shell export needed.
#   If .env doesn't exist the container starts anyway (stub mode).

services:
  evalsmith:
    build: .
    image: evalsmith:latest
    container_name: evalsmith
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Project workspaces live outside the container so they persist
      # across rebuilds / restarts / image upgrades.
      - ./projects:/app/projects
      # Knowledge library is also bind-mounted so /contribute writes survive.
      - ./knowledge:/app/knowledge

    # env_file loads the .env from the repo root DIRECTLY into the container's
    # os.environ — the most reliable method across all Docker Compose versions.
    # Shell-level overrides (environment: section below) take priority over
    # anything set in the file.
    env_file:
      - path: .env
        required: false   # don't fail if .env doesn't exist (stub mode)

    environment:
      # These override the env_file values if set in the host shell.
      # Useful for CI / cloud deployments where keys come from secrets managers.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # If you set this, the framework's `knowledge/` retrieval points
      # there instead of the default. Useful for shared knowledge stores.
      GENAI_KNOWLEDGE_ROOT: ${GENAI_KNOWLEDGE_ROOT:-/app/knowledge}

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
