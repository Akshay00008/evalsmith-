{% extends "base.html" %}
{% block content %}

<nav class="mb-3" aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="/projects/{{ name }}">{{ name }}</a></li>
        <li class="breadcrumb-item active">Results</li>
    </ol>
</nav>

<h1><i class="bi bi-file-earmark-text"></i> Results</h1>

<div class="card p-4 mb-3">
    <!-- We let the browser render the markdown via marked.js so we don't need a Python markdown lib. -->
    <div id="final-md" data-md="{{ final_md|e }}">Loading…</div>
</div>

{% if chart_rows != '[]' %}
<div class="card p-4 mb-3">
    <h5>Metric over iterations</h5>
    <canvas id="metric-chart" height="80"></canvas>
</div>
{% endif %}

<div class="d-flex gap-2">
    <a class="btn btn-outline-primary" href="/projects/{{ name }}">← Back to project</a>
    <a class="btn btn-primary" href="/projects/{{ name }}/chat"><i class="bi bi-chat-dots"></i> Chat with the winner →</a>
</div>

<!-- Markdown rendering via marked.js (small, CDN). Avoids server-side markdown deps. -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const md = document.getElementById('final-md').getAttribute('data-md');
document.getElementById('final-md').innerHTML = marked.parse(md);
</script>

{% if chart_rows != '[]' %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const rows = {{ chart_rows | safe }};
new Chart(document.getElementById('metric-chart'), {
    type: 'line',
    data: {
        labels: rows.map(r => 'iter ' + r.iter),
        datasets: [{
            label: 'Primary metric',
            data: rows.map(r => r.value),
            tension: 0.3,
            borderColor: 'rgb(13, 110, 253)',
            backgroundColor: 'rgba(13, 110, 253, 0.1)',
            fill: true,
        }],
    },
    options: { scales: { y: { beginAtZero: true, max: 1 } } },
});
</script>
{% endif %}

{% endblock %}
