<!DOCTYPE html>
<!--
  Shared layout. Every page extends this template — common nav, footer,
  Bootstrap + HTMX includes, and a single block for page-specific content.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or "evalsmith" }}</title>

    <!-- Bootstrap 5 from CDN. Saves us a CSS build step. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- HTMX powers the dynamic bits (form submits, partial updates). -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- HTMX SSE extension for the live progress stream on the Run page. -->
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg bg-primary navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-tools"></i> evalsmith
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-grid"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/projects/new"><i class="bi bi-plus-circle"></i> New project</a></li>
            </ul>
            <span class="navbar-text text-light small">
                <i class="bi bi-info-circle"></i>
                <a class="text-light" href="https://github.com/Akshay00008/evalsmith-/blob/main/docs/NONTECH_GUIDE.md" target="_blank">Help</a>
            </span>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted small py-3">
    evalsmith · v0.1.0
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
